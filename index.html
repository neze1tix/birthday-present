<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днём Рождения, Папа!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2b1b3a, #0f0c1f);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Звезды */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF69B4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
        }

        .gift-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .gift-wrapper:hover:not(.open) {
            transform: scale(1.03);
        }

        .lid {
            position: absolute;
            top: -40px;
            left: 0;
            right: 0;
            height: 90px;
            background: linear-gradient(180deg, #ff6b6b, #c92a2a);
            border-radius: 25px 25px 0 0;
            border-bottom: 8px solid #9b2c2c;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 20;
            transition: transform 0.5s;
        }

        .lid.open {
            transform: translateY(-150px) rotate(10deg);
            opacity: 0;
        }

        .bow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #B8860B);
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 2px 10px rgba(255,255,255,0.5);
        }

        .bow::before, .bow::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 30px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.5);
        }

        .bow::before {
            left: -25px;
            transform: translateY(-50%) rotate(-15deg);
        }

        .bow::after {
            right: -25px;
            transform: translateY(-50%) rotate(15deg);
        }

        .bow-top {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 30% 30%, #FFF, #FFD700);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .box {
            width: 100%;
            aspect-ratio: 1/1;
            background: linear-gradient(145deg, #ff6b6b, #c92a2a);
            border-radius: 40px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.4), inset 0 2px 10px rgba(255,255,255,0.3);
            position: relative;
            overflow: hidden;
        }

        .ribbon-vertical {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 70px;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #FFD700, #FDB931, #FFD700);
            z-index: 10;
            box-shadow: 0 0 20px rgba(255,215,0,0.3), inset 0 2px 10px rgba(255,255,255,0.5);
        }

        .ribbon-horizontal {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 70px;
            transform: translateY(-50%);
            background: linear-gradient(180deg, #FFD700, #FDB931, #FFD700);
            z-index: 10;
            box-shadow: 0 0 20px rgba(255,215,0,0.3), inset 0 2px 10px rgba(255,255,255,0.5);
        }

        .center-bow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #B8860B);
            border-radius: 50%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3), inset 0 3px 15px rgba(255,255,255,0.6);
        }

        .center-bow::before, .center-bow::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 40px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: inset 0 3px 10px rgba(255,255,255,0.5);
        }

        .center-bow::before {
            left: -30px;
            transform: translateY(-50%) rotate(-15deg);
        }

        .center-bow::after {
            right: -30px;
            transform: translateY(-50%) rotate(15deg);
        }

        .center-bow-top {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #FFF, #FFD700);
            border-radius: 50%;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .center-bow-bottom {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 35px;
            background: radial-gradient(circle at 30% 30%, #FFF, #FFD700);
            border-radius: 50%;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .open-text {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 30;
            animation: pulse 1.8s infinite;
        }

        .open-text span {
            display: inline-block;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            color: white;
            font-size: clamp(1.3rem, 4vw, 2rem);
            font-weight: bold;
            padding: 15px 45px;
            border-radius: 60px;
            border: 2px solid rgba(255,215,0,0.8);
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        .congrats {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            width: 90%;
            max-width: 650px;
            display: none;
        }

        .congrats.show {
            display: block;
        }

        .congrats-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 60px;
            padding: clamp(30px, 5vw, 50px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 3px #FFD700, 0 0 50px #FFD700;
            position: relative;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        .congrats h2 {
            font-size: clamp(2rem, 6vw, 4rem);
            margin-bottom: 30px;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF69B4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .congrats p {
            margin-bottom: 20px;
            font-size: clamp(1.1rem, 3vw, 1.5rem);
        }

        .congrats .gold {
            color: #FFD700;
            font-weight: bold;
        }

        .congrats button {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #1a1a2e;
            border: none;
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 20px gold;
        }

        .congrats button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 30px gold;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 90;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .hint {
            position: absolute;
            bottom: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="overlay" id="overlay"></div>

    <div class="container">
        <h1>С Днём Рождения, Папа!</h1>

        <div class="gift-wrapper" id="giftWrapper">
            <div class="lid" id="lid">
                <div class="bow">
                    <div class="bow-top"></div>
                </div>
            </div>
            
            <div class="box">
                <div class="ribbon-vertical"></div>
                <div class="ribbon-horizontal"></div>
                
                <div class="center-bow">
                    <div class="center-bow-top"></div>
                    <div class="center-bow-bottom"></div>
                </div>

                <div class="open-text" id="openText">
                    <span>✨ ОТКРЫТЬ ✨</span>
                </div>
            </div>
        </div>

        <div class="hint" id="hint">Нажми на подарок 🎁</div>
    </div>

    <div class="congrats" id="congrats">
        <div class="congrats-content">
            <h2>🎉 С ДНЁМ РОЖДЕНИЯ! 🎉</h2>
            <p><span class="gold">Папа!</span> Ты лучший!</p>
            <p>Спасибо за твою заботу, тепло и поддержку.<br>Ты всегда рядом и это бесценно.</p>
            <p class="gold">Крепкого здоровья, счастья<br>и исполнения всех желаний!</p>
            <p style="font-size: 2rem; background: linear-gradient(135deg, #FF69B4, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900;">❤️ Я ТЕБЯ ОЧЕНЬ ЛЮБЛЮ! ❤️</p>
            <button onclick="closeCongrats()">Закрыть</button>
        </div>
    </div>

    <script>
        // Создание звезд
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = (Math.random() * 3 + 1) + 'px';
            star.style.height = (Math.random() * 3 + 1) + 'px';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            starsContainer.appendChild(star);
        }

        const giftWrapper = document.getElementById('giftWrapper');
        const lid = document.getElementById('lid');
        const openText = document.getElementById('openText');
        const hint = document.getElementById('hint');
        const congrats = document.getElementById('congrats');
        const overlay = document.getElementById('overlay');

        let isOpen = false;

        giftWrapper.addEventListener('click', function() {
            if (isOpen) return;
            
            isOpen = true;
            
            // Анимация открытия
            lid.classList.add('open');
            openText.style.display = 'none';
            hint.style.display = 'none';
            
            // Показываем затемнение и поздравление
            setTimeout(() => {
                overlay.classList.add('show');
                congrats.classList.add('show');
            }, 500);
        });

        window.closeCongrats = function() {
            overlay.classList.remove('show');
            congrats.classList.remove('show');
        };
    </script>
</body>
</html>
